---
# Docker compose file for dev environments.
services:
  lanraragi:
    build:
      dockerfile: tools/build/docker/Dockerfile-dev
      context: ../../..
    volumes:
      - ../../../:/home/koyomi/lanraragi
    ports:
      - "3000:3000"
    environment:
      - "LRR_REDIS_ADDRESS=redis:6379"
    networks:
      - lrr

  redis:
    image: "docker.io/valkey/valkey:9"
    volumes:
      - redis_data:/data
    networks:
      - lrr

networks:
  lrr:

volumes:
  redis_data:
